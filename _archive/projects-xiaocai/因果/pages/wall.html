    <script>
        const WALL_KEY = 'causelaw_wall_items';
        const WALL_DAILY_KEY = 'causelaw_wall_daily_state_v1';
        const WALL_BONUS_KEY = 'causelaw_wall_bonus_total';
        const wall = document.getElementById('visual-wall');
        const wallLayer = document.getElementById('wall-items-layer');
        let wallFilter = 'all';

        function dbTable(name, fallback) {
            var db = window.CauseLawClient && window.CauseLawClient.DB;
            if (db && db.tables && db.tables[name]) return db.tables[name];
            return fallback;
        }

        function dbRpc(name, fallback) {
            var db = window.CauseLawClient && window.CauseLawClient.DB;
            if (db && db.rpc && db.rpc[name]) return db.rpc[name];
            return fallback;
        }

        function setWallSyncStatus(message, tone) {
            var el = document.getElementById('wall-sync-status');
            if (!el) return;
            el.textContent = message;
            el.className = 'text-xs text-center mb-2 ' + (tone === 'error' ? 'text-red-400' : (tone === 'ok' ? 'text-emerald-400' : 'text-stone-500'));
        }

        function getTodayStr() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }

        function getWallDailyState() {
            const today = getTodayStr();
            try {
                const raw = localStorage.getItem(WALL_DAILY_KEY);
                if (!raw) return { date: today, count: 0, texts: [] };
                const obj = JSON.parse(raw);
                if (!obj || obj.date !== today) return { date: today, count: 0, texts: [] };
                if (!Array.isArray(obj.texts)) obj.texts = [];
                if (typeof obj.count !== 'number') obj.count = 0;
                return obj;
            } catch (e) {
                return { date: today, count: 0, texts: [] };
            }
        }

        function saveWallDailyState(state) {
            try {
                localStorage.setItem(WALL_DAILY_KEY, JSON.stringify(state));
            } catch (e) {}
        }

        function getWallBonusTotal() {
            try {
                const v = parseInt(localStorage.getItem(WALL_BONUS_KEY) || '0', 10);
                return isNaN(v) ? 0 : v;
            } catch (e) {
                return 0;
            }
        }

        function addWallBonus(points) {
            if (!points) return;
            try {
                const current = getWallBonusTotal();
                const next = current + points;
                localStorage.setItem(WALL_BONUS_KEY, String(next));
                const curNetRaw = localStorage.getItem('causelaw_merit_net_score');
                const curNet = parseInt(curNetRaw || '0', 10);
                const base = isNaN(curNet) ? 0 : curNet;
                localStorage.setItem('causelaw_merit_net_score', String(base + points));
            } catch (e) {}
        }

        function normalizeWallText(text) {
            return (text || '').replace(/\s+/g, ' ').trim();
        }

        function validateWallMerit(type, text) {
            const MAX_PER_DAY = 5;
            const daily = getWallDailyState();
            if (daily.count >= MAX_PER_DAY) {
                alert('今日懺悔與祈福合計已達 ' + MAX_PER_DAY + ' 則，請明日再繼續。');
                return null;
            }
            const normalized = normalizeWallText(text);
            if (normalized && Array.isArray(daily.texts) && daily.texts.some(function (t) { return t === normalized; })) {
                alert('每一則懺悔或祈福內容需要與前幾則略有不同，請調整文字再送出。');
                return null;
            }
            const points = type === 'confess' ? 4 : 2;
            return { points: points, daily: daily, normalized: normalized, max: MAX_PER_DAY };
        }

        function commitWallMerit(result) {
            if (!result) return null;
            result.daily.count += 1;
            result.daily.texts = result.daily.texts || [];
            if (result.normalized) result.daily.texts.push(result.normalized);
            saveWallDailyState(result.daily);
            addWallBonus(result.points);
            return { points: result.points, count: result.daily.count, max: result.max };
        }

        function getItems() {
            try {
                return JSON.parse(localStorage.getItem(WALL_KEY) || '[]');
            } catch (e) { return []; }
        }
        function saveItems(items) {
            localStorage.setItem(WALL_KEY, JSON.stringify(items));
        }

        async function loadCloudWallItems() {
            if (!window.CauseLawClient || !window.CauseLawClient.isReady()) {
                setWallSyncStatus('會員未連線，牆面資料目前僅存本機。', 'info');
                return;
            }
            try {
                var sessionUser = await window.CauseLawClient.getSessionUser();
                if (!sessionUser) {
                    setWallSyncStatus('尚未登入會員，牆面資料目前僅存本機。', 'info');
                    return;
                }
                if (window.CauseLawClient.ensureMemberProfile) {
                    await window.CauseLawClient.ensureMemberProfile(sessionUser);
                }
                var supabase = window.CauseLawClient.getClient();
                var query = await supabase
                    .from(dbTable('wallEntries', 'causelaw_yinguo_v1.wall_entries'))
                    .select('id,entry_type,target,author_name,text_content,is_anonymous,created_at')
                    .eq('member_id', sessionUser.id)
                    .order('created_at', { ascending: true });
                if (query.error) throw query.error;
                var local = getItems();
                var existingIds = {};
                local.forEach(function (x) {
                    if (x.cloudId) existingIds[x.cloudId] = true;
                });
                (query.data || []).forEach(function (row) {
                    if (existingIds[row.id]) return;
                    local.push({
                        id: 'cloud_' + row.id,
                        cloudId: row.id,
                        type: row.entry_type,
                        text: row.text_content,
                        target: row.target || '',
                        authorName: row.is_anonymous ? '' : (row.author_name || ''),
                        createdAt: row.created_at,
                        source: 'cloud'
                    });
                });
                saveItems(local);
                setWallSyncStatus('已連線會員雲端牆：' + (sessionUser.email || sessionUser.id), 'ok');
            } catch (err) {
                console.error('載入雲端祈福/懺悔資料失敗:', err);
                setWallSyncStatus('雲端牆載入失敗，已保留本機資料。', 'error');
            }
        }

        async function syncWallItemToCloud(item) {
            if (!window.CauseLawClient || !window.CauseLawClient.isReady()) {
                throw new Error('會員未連線，無法同步牆面內容。');
            }
            var sessionUser = await window.CauseLawClient.getSessionUser();
            if (!sessionUser) {
                throw new Error('請先登入會員後再同步祈福或懺悔。');
            }
            if (window.CauseLawClient.ensureMemberProfile) {
                await window.CauseLawClient.ensureMemberProfile(sessionUser);
            }
            return window.CauseLawClient.rpcCall(
                dbRpc('createWallEntry', 'causelaw_yinguo_v1.create_wall_entry'),
                {
                    p_entry_type: item.type,
                    p_target: item.target || null,
                    p_author_name: item.authorName || null,
                    p_text_content: item.text,
                    p_is_anonymous: !item.authorName
                },
                'create_wall_entry'
            );
        }

        // 懺悔石：左側偏下往上堆疊（避開下方輸入框重疊區）
        function stackPositionConfess(index) {
            var perRow = 5;
            var row = Math.floor(index / perRow);
            var col = index % perRow;
            var jitterX = (Math.sin(index * 1.3) * 1.8 + 1.8);
            var jitterY = (Math.cos(index * 0.7) * 0.9);
            var top = 78 - row * 5.8 + jitterY;
            if (top < 16) top = 16 + (row % 2) * 1.2;
            return {
                left: (10 + col * 9 + (row % 2) * 4 + jitterX) + '%',
                top: top + '%'
            };
        }
        // 祈福燈：右側由上往下堆疊（一串燈）
        function stackPositionBless(index) {
            var row = Math.floor(index / 3);
            var col = index % 3;
            var jitterX = (Math.sin(index * 0.9) * 2);
            var jitterY = (Math.cos(index * 1.1) * 1.5);
            return {
                left: (68 + col * 12 + jitterX) + '%',
                top: (6 + row * 8 + jitterY) + '%'
            };
        }

        function renderWallItems() {
            var items = getItems();
            var confess = items.filter(function (i) { return i.type === 'confess'; }).sort(function (a, b) { return (a.createdAt || '').localeCompare(b.createdAt || ''); });
            var bless = items.filter(function (i) { return i.type === 'bless'; }).sort(function (a, b) { return (a.createdAt || '').localeCompare(b.createdAt || ''); });
            wallLayer.innerHTML = '';

            function addItem(item, pos, stackIndex) {
                if (wallFilter !== 'all' && item.type !== wallFilter) return;
                var el = document.createElement('div');
                el.className = 'wall-item ' + item.type;
                el.innerText = item.type === 'bless' ? '🪷' : '🪨';
                el.title = '點擊查看內容';
                el.dataset.id = item.id;
                el.style.left = pos.left;
                el.style.top = pos.top;
                // 新的項目放在較上層，避免堆疊時被舊項目擋住點擊
                el.style.zIndex = String((item.type === 'bless' ? 30 : 20) + stackIndex);
                el.addEventListener('click', function () { showWallModal(item); });
                wallLayer.appendChild(el);
            }

            confess.forEach(function (item, i) { addItem(item, stackPositionConfess(i), i); });
            bless.forEach(function (item, i) { addItem(item, stackPositionBless(i), i); });
        }

        function showWallModal(item) {
            var modal = document.getElementById('wall-modal');
            var inner = document.getElementById('wall-modal-inner');
            inner.className = 'wall-modal-inner ' + item.type;
            document.getElementById('wall-modal-icon').textContent = item.type === 'bless' ? '🪷' : '🪨';
            document.getElementById('wall-modal-type').textContent = item.type === 'bless' ? '【為人祈福】' : '【匿名懺悔】';
            var metaParts = [];
            if (item.target && item.target.trim()) metaParts.push((item.type === 'bless' ? '為誰祈福：' : '對誰懺悔：') + item.target.trim());
            metaParts.push((item.authorName && item.authorName.trim()) ? '署名：' + item.authorName.trim() : '署名：匿名');
            document.getElementById('wall-modal-meta-wrap').textContent = metaParts.join('　｜　');
            document.getElementById('wall-modal-date-wrap').textContent = item.createdAt ? new Date(item.createdAt).toLocaleString('zh-TW', { dateStyle: 'medium', timeStyle: 'short' }) : '';
            document.getElementById('wall-modal-text').textContent = item.text || '';
            modal.classList.remove('hidden');
        }
        function closeWallModal() {
            document.getElementById('wall-modal').classList.add('hidden');
        }
        document.getElementById('wall-modal').addEventListener('click', function (e) {
            if (e.target === this) closeWallModal();
        });

        document.querySelectorAll('.wall-filter button').forEach(function (btn) {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.wall-filter button').forEach(function (b) { b.classList.remove('active'); });
                this.classList.add('active');
                wallFilter = this.dataset.filter;
                renderWallItems();
            });
        });

        async function postItem(type) {
            var textEl = document.getElementById(type + '-text');
            var text = (textEl.value || '').trim();
            if (!text) return;

            var meritDraft = validateWallMerit(type, text);
            if (!meritDraft) return;

            var target = (document.getElementById(type + '-target').value || '').trim();
            var authorName = (document.getElementById(type + '-name').value || '').trim();

            var id = 'w' + Date.now();
            var item = { id: id, type: type, text: text, target: target, authorName: authorName, createdAt: new Date().toISOString(), source: 'local' };
            var synced = false;
            if (window.CauseLawClient && window.CauseLawClient.isReady()) {
                try {
                    var cloudRow = await syncWallItemToCloud(item);
                    if (!cloudRow || !cloudRow.id) throw new Error('牆面同步回傳資料格式錯誤。');
                    item.cloudId = cloudRow.id;
                    item.createdAt = cloudRow.created_at || item.createdAt;
                    item.source = 'cloud';
                    if (cloudRow.is_anonymous) item.authorName = '';
                    synced = true;
                } catch (err) {
                    console.error('雲端同步祈福/懺悔失敗:', err);
                    alert((err && err.message) || '牆面同步失敗，請稍後再試。');
                    return;
                }
            }

            var items = getItems();
            items.push(item);
            saveItems(items);
            var meritInfo = commitWallMerit(meritDraft);

            // 先播一段動畫再出現常駐
            const animEl = document.createElement('div');
            animEl.className = type === 'bless' ? 'lantern' : 'confession-stone';
            animEl.innerText = type === 'bless' ? '🪷' : '🪨';
            const startX = Math.random() * 90;
            const drift = (Math.random() - 0.5) * 100;
            animEl.style.left = startX + '%';
            animEl.style.setProperty('--drift', drift + 'px');
            animEl.style.animationDuration = '4s';
            wall.appendChild(animEl);
            setTimeout(function () { animEl.remove(); renderWallItems(); }, 4000);

            textEl.value = '';
            document.getElementById(type + '-target').value = '';
            document.getElementById(type + '-name').value = '';
            if (synced) {
                setWallSyncStatus('已同步最新' + (type === 'bless' ? '祈福燈' : '懺悔石') + '到會員雲端牆。', 'ok');
            }
            var msg = type === 'bless' ? '願望已寄往天聽，可點擊牆上燈火查看' : '業力已交付虛空，可點擊牆上石頭查看';
            if (meritInfo && meritInfo.points) {
                msg += '\n本次加分：' + meritInfo.points + ' 點（今日第 ' + meritInfo.count + ' 則，最多 ' + meritInfo.max + ' 則）。';
            }
            alert(msg + (synced ? '\n（已同步會員雲端）' : '\n（目前僅本機）'));
        }

        (async function initWall() {
            await loadCloudWallItems();
            renderWallItems();
        })();
        window.addEventListener('causelaw:auth-state-changed', function () {
            loadCloudWallItems()
                .then(function () {
                    renderWallItems();
                })
                .catch(function (err) {
                    console.error('會員狀態切換後刷新牆面失敗:', err);
                });
        });
    </script>
</body>
</html>
