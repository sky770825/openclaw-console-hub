        function escapeHtml(value) {
            const d = document.createElement('div');
            d.textContent = value == null ? '' : String(value);
            return d.innerHTML;
        }

        function safeSourceType(value) {
            return ['member', 'local', 'sample'].indexOf(value) !== -1 ? value : 'local';
        }

        function buildPostHref(id) {
            return 'post.html?id=' + encodeURIComponent(String(id || ''));
        }


        function normalizeLocalPost(p) {
            var tags = Array.isArray(p.tags) ? p.tags : (p.scripture_tags || []);
            return {
                id: p.id,
                title: p.title || '(未命名)',
                content: p.content || '',
                category: p.category || '其他',
                author: p.author || p.display_name || '匿名',
                viewCount: Number(p.viewCount || p.view_count || 0),
                commentCount: Number(p.commentCount || p.comment_count || 0),
                likeCount: Number(p.likeCount || p.like_count || 0),
                createdAt: p.createdAt || p.created_at || new Date().toISOString(),
                sourceType: p.sourceType || 'local',
                sourceLabel: p.sourceLabel || '本地投稿',
                tags: tags
            };
        }

        async function loadPosts() {
            const fallbackLocalApproved = JSON.parse(localStorage.getItem('causelaw_approved_posts') || '[]').map(function (item) {
                return normalizeLocalPost({
                    ...item,
                    sourceType: 'local',
                    sourceLabel: '本地投稿'
                });
            });
            const samplePosts = MOCK_POSTS.map(function (post) {
                return normalizeLocalPost({
                    ...post,
                    sourceType: 'local',
                    sourceLabel: '本地投稿'
                });
            });
            if (window.CauseLawClient && window.CauseLawClient.isReady()) {
                try {
                    const supabase = window.CauseLawClient.getClient();
                    const query = await supabase
                        .from(dbTable('posts', 'causelaw_yinguo_v1.posts'))
                        .select('id,title,content,category,display_name,view_count,comment_count,like_count,created_at,status')
                        .eq('status', 'approved')
                        .order('created_at', { ascending: false });
                    if (query.error) throw query.error;
                    allPosts = (query.data || []).map(function (row) {
                        return normalizeLocalPost({
                            id: row.id,
                            title: row.title,
                            content: row.content,
                            category: row.category,
                            display_name: row.display_name,
                            view_count: row.view_count,
                            comment_count: row.comment_count,
                            like_count: row.like_count,
                            created_at: row.created_at,
                            sourceType: 'member',
                            sourceLabel: '會員投稿'
                        });
                    });
                } catch (err) {
                    console.error('Supabase 載入失敗，改用本地資料:', err);
                    allPosts = fallbackLocalApproved.concat(samplePosts);
                }
            } else {
                allPosts = fallbackLocalApproved.concat(samplePosts);
            }
            renderPosts();
        }

        function renderDataSummary(posts) {
            const summaryEl = document.getElementById('forum-data-summary');
            if (!summaryEl) return;
            const memberCount = posts.filter(function (p) { return p.sourceType === 'member'; }).length;
            const localCount = posts.filter(function (p) { return p.sourceType === 'local' || !p.sourceType; }).length;
            summaryEl.innerHTML = `
                目前共 <span class="text-gold">${posts.length}</span> 則　
                會員投稿 <span class="text-sky-300">${memberCount}</span>　
                本地投稿 <span class="text-amber-200">${localCount}</span>
            `;
        }

        // 渲染投稿列表
        function renderPosts() {
            const container = document.getElementById('posts-container');
            let filtered = allPosts;

            // 分類篩選
            if (currentCategory !== 'all') {
                filtered = filtered.filter(p => p.category === currentCategory);
            }

            // 排序
            if (currentSort === 'latest') {
                filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            } else if (currentSort === 'hot') {
                filtered.sort((a, b) => (b.likeCount + b.commentCount) - (a.likeCount + a.commentCount));
            } else if (currentSort === 'comments') {
                filtered.sort((a, b) => b.commentCount - a.commentCount);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-center text-stone-500 py-20"><p>目前沒有投稿</p></div>';
                renderDataSummary(filtered);
                return;
            }

            renderDataSummary(filtered);

            container.innerHTML = filtered.map(function (post) {
                var preview = post.content || '';
                if (preview.length > 200) preview = preview.substring(0, 200) + '...';
                var sourceType = safeSourceType(post.sourceType);
                var tags = post.tags && post.tags.length ? post.tags.map(function (tag) {
                    return '<a href="audio.html" class="forum-scripture-tag" onclick="event.stopPropagation()">#' + escapeHtml(String(tag)) + '</a>';
                }).join('') : '';
                var tagsRow = tags ? ('<div class="forum-scripture-tags">' + tags + '</div>') : '';
                return (
                    '<div class="post-card" role="link" tabindex="0" data-post-href="' + escapeHtml(buildPostHref(post.id)) + '">' +
                        '<span class="post-category">' + escapeHtml(post.category || '其他') + '</span><span class="source-badge ' + sourceType + '">' + escapeHtml(post.sourceLabel || '本地投稿') + '</span>' +
                        '<h2 class="text-3xl text-gold mb-4">' + escapeHtml(post.title || '(未命名)') + '</h2>' +
                        '<p class="post-preview">' + escapeHtml(preview) + '</p>' +
                        tagsRow +
                        '<div class="post-meta">' +
                            '<span>👤 ' + escapeHtml(post.author || '匿名') + '</span>' +
                            '<span>👁️ ' + Number(post.viewCount || 0) + '</span>' +
                            '<span>💬 ' + Number(post.commentCount || 0) + '</span>' +
                            '<span>❤️ ' + Number(post.likeCount || 0) + '</span>' +
                            '<span>🕐 ' + escapeHtml(formatDate(post.createdAt)) + '</span>' +
                        '</div>' +
                    '</div>'
                );
            }).join('');
        }

        // 分類篩選
        function filterCategory(category, btnEl) {
            currentCategory = category;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (btnEl) btnEl.classList.add('active');
            renderPosts();
        }

        // 排序
        function sortPosts(sort) {
            currentSort = sort;
            renderPosts();
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days} 天前`;
            return date.toLocaleDateString('zh-TW');
        }

        async function updateForumMemberState() {
            var el = document.getElementById('forum-member-state');
            var authBtn = document.getElementById('forum-auth-btn');
            if (!el) return;
            var user = window.CauseLawClient ? await window.CauseLawClient.getSessionUser() : null;
            if (user && window.CauseLawClient && window.CauseLawClient.ensureMemberProfile) {
                try {
                    await window.CauseLawClient.ensureMemberProfile(user);
                } catch (err) {
                    console.error('會員檔案初始化失敗:', err);
                }
            }
            var displayName = window.CauseLawClient ? window.CauseLawClient.effectiveDisplayName() : '匿名';
            if (authBtn) authBtn.textContent = user ? '登出會員' : '會員登入';
            if (window.CauseLawClient && window.CauseLawClient.isReady()) {
                el.textContent = user
                    ? ('會員已登入：投稿會先檢測不雅文字，通過即自動上架；以「' + displayName + '」名義送出。')
                    : ('可使用帳號會員登入；投稿會先檢測不雅文字，通過即自動上架。');
            } else {
                el.textContent = '尚未設定 Supabase，討論區目前以本地示範資料顯示。';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            loadPosts();
            updateForumMemberState();
            var postsContainer = document.getElementById('posts-container');
            if (postsContainer) {
                postsContainer.addEventListener('click', function (event) {
                    var card = event.target.closest('.post-card[data-post-href]');
                    if (!card) return;
                    var href = card.getAttribute('data-post-href');
                    if (href) window.location.href = href;
                });
                postsContainer.addEventListener('keydown', function (event) {
                    if (event.key !== 'Enter' && event.key !== ' ') return;
                    var card = event.target.closest('.post-card[data-post-href]');
                    if (!card) return;
                    event.preventDefault();
                    var href = card.getAttribute('data-post-href');
                    if (href) window.location.href = href;
                });
            }
            var authBtn = document.getElementById('forum-auth-btn');
            if (authBtn) authBtn.addEventListener('click', async function () {
                if (!window.CauseLawAuth || typeof window.CauseLawAuth.openAuthFlow !== 'function') {
                    uiToast('會員登入模組尚未載入，請重新整理。', 'error');
                    return;
                }
                await window.CauseLawAuth.openAuthFlow();
            });
        });
        window.addEventListener('causelaw:auth-state-changed', function () {
            updateForumMemberState();
        });
    </script>
</body>
</html>
