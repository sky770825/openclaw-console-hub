<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1280px;
      height: 720px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      position: relative;
      overflow: hidden;
    }
    
    /* Background decoration */
    .bg-pattern {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0.05;
      background-image: 
        repeating-linear-gradient(45deg, #fff 0, #fff 1px, transparent 0, transparent 50%);
      background-size: 40px 40px;
    }
    
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,255,0.15) 0%, transparent 70%);
      top: -200px;
      right: -200px;
    }
    
    .glow-2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,107,53,0.1) 0%, transparent 70%);
      bottom: -100px;
      left: -100px;
    }
    
    /* Main content */
    .content {
      text-align: center;
      z-index: 10;
    }
    
    .icon {
      font-size: 80px;
      margin-bottom: 30px;
      display: block;
    }
    
    .title {
      font-size: 72px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -2px;
      margin-bottom: 10px;
      text-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    
    .subtitle {
      font-size: 42px;
      font-weight: 600;
      background: linear-gradient(90deg, #00d4ff, #7b2cbf);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 40px;
    }
    
    .features {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 50px;
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.8);
      font-size: 20px;
      font-weight: 500;
    }
    
    .feature-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #00d4ff, #0099cc);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }
    
    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #ff6b35, #f7931e);
      color: #fff;
      padding: 12px 35px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(255,107,53,0.4);
    }
    
    /* Corner accents */
    .corner {
      position: absolute;
      width: 150px;
      height: 150px;
      border: 2px solid rgba(0,212,255,0.2);
    }
    
    .corner-tl { top: 40px; left: 40px; border-right: none; border-bottom: none; }
    .corner-br { bottom: 40px; right: 40px; border-left: none; border-top: none; }
  </style>
</head>
<body>
  <div class="bg-pattern"></div>
  <div class="glow"></div>
  <div class="glow-2"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-br"></div>
  
  <div class="content">
    <div class="icon">⚡</div>
    <h1 class="title">GitHub Automation</h1>
    <p class="subtitle">for OpenClaw</p>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">◆</div>
        <span>Issue</span>
      </div>
      <div class="feature">
        <div class="feature-icon">◆</div>
        <span>PR</span>
      </div>
      <div class="feature">
        <div class="feature-icon">◆</div>
        <span>Release</span>
      </div>
    </div>
    
    <div class="badge">Professional Skill</div>
  </div>
</body>
</html>
