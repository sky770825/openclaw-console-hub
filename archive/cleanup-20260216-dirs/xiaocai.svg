<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500"> <!-- 背景 --> <rect width="400" height="500" fill="#f0f8ff"/> <!-- 陰影 --> <ellipse cx="200" cy="450" rx="80" ry="15" fill="#00000015"/> <!-- 身體 --> <ellipse cx="200" cy="320" rx="85" ry="95" fill="#FFE17D"/> <ellipse cx="200" cy="320" rx="75" ry="85" fill="#FFF4B8"/> <!-- 腹部淺色區域 --> <ellipse cx="200" cy="340" rx="50" ry="60" fill="#FFFAE0"/> <!-- 左翅膀 --> <g transform="translate(110, 300)"> <ellipse cx="0" cy="0" rx="35" ry="45" fill="#FFD966" transform="rotate(-20)"/> <!-- 護腕 --> <rect x="-15" y="25" width="30" height="15" rx="3" fill="#B8B8B8"/> </g> <!-- 右翅膀 - 叉腰姿勢 --> <g transform="translate(290, 300)"> <ellipse cx="0" cy="0" rx="35" ry="45" fill="#FFD966" transform="rotate(20)"/> <!-- 護腕 --> <rect x="-15" y="25" width="30" height="15" rx="3" fill="#B8B8B8"/> </g> <!-- 小背心 --> <path d="M 150 280 Q 150 260 170 250 L 230 250 Q 250 260 250 280 L 250 340 Q 250 350 240 350 L 160 350 Q 150 350 150 340 Z" fill="#87CEEB" opacity="0.9"/> <!-- 背心口袋 --> <rect x="185" y="290" width="30" height="25" rx="3" fill="#6BA8D0"/> <!-- 電容筆 --> <rect x="208" y="285" width="4" height="35" rx="2" fill="#4A4A4A"/> <circle cx="210" cy="283" r="3" fill="#FF6B6B"/> <!-- 頭部 --> <circle cx="200" cy="200" r="75" fill="#FFE17D"/> <circle cx="200" cy="200" r="65" fill="#FFF4B8"/> <!-- 臉頰淺色區域 --> <ellipse cx="160" cy="210" rx="25" ry="20" fill="#FFFAE0"/> <ellipse cx="240" cy="210" rx="25" ry="20" fill="#FFFAE0"/> <!-- 呆毛 --> <path d="M 200 130 Q 195 115 200 100 Q 205 115 200 130" fill="#FFD966"/> <path d="M 200 130 Q 195 120 200 105 Q 205 120 200 130" fill="#FFE17D"/> <!-- 左眼 --> <circle cx="175" cy="195" r="18" fill="white"/> <circle cx="175" cy="195" r="14" fill="#5C4033"/> <circle cx="178" cy="192" r="6" fill="white"/> <circle cx="172" cy="198" r="3" fill="white"/> <!-- 右眼 --> <circle cx="225" cy="195" r="18" fill="white"/> <circle cx="225" cy="195" r="14" fill="#5C4033"/> <circle cx="228" cy="192" r="6" fill="white"/> <circle cx="222" cy="198" r="3" fill="white"/> <!-- 眉毛 - 自信的表情 --> <path d="M 160 175 Q 170 170 185 173" stroke="#5C4033" stroke-width="3" fill="none" stroke-linecap="round"/> <path d="M 215 173 Q 230 170 240 175" stroke="#5C4033" stroke-width="3" fill="none" stroke-linecap="round"/> <!-- 嘴巴 - 微笑上揚 --> <path d="M 185 220 Q 200 228 215 220" stroke="#FF8C42" stroke-width="4" fill="none" stroke-linecap="round"/> <path d="M 185 220 Q 200 225 215 220" fill="#FF8C42"/> <!-- 小圓嘴 --> <ellipse cx="200" cy="218" rx="8" ry="6" fill="#FF8C42"/> <!-- 腮紅 --> <ellipse cx="155" cy="210" rx="12" ry="8" fill="#FFB6C1" opacity="0.4"/> <ellipse cx="245" cy="210" rx="12" ry="8" fill="#FFB6C1" opacity="0.4"/> <!-- 小腳 --> <g transform="translate(170, 410)"> <ellipse cx="0" cy="0" rx="15" ry="8" fill="#FF8C42"/> <rect x="-12" y="-3" width="8" height="3" fill="#FF8C42"/> <rect x="-3" y="-3" width="8" height="3" fill="#FF8C42"/> <rect x="6" y="-3" width="8" height="3" fill="#FF8C42"/> </g> <g transform="translate(230, 410)"> <ellipse cx="0" cy="0" rx="15" ry="8" fill="#FF8C42"/> <rect x="-12" y="-3" width="8" height="3" fill="#FF8C42"/> <rect x="-3" y="-3" width="8" height="3" fill="#FF8C42"/> <rect x="6" y="-3" width="8" height="3" fill="#FF8C42"/> </g> <!-- 徽章 --> <g transform="translate(200, 360)"> <circle cx="0" cy="0" r="18" fill="#C0C0C0"/> <circle cx="0" cy="0" r="15" fill="#E8E8E8"/> <text x="0" y="2" font-family="Arial, sans-serif" font-size="8" fill="#4A4A4A" text-anchor="middle" font-weight="bold">AI</text> <text x="0" y="9" font-family="Arial, sans-serif" font-size="6" fill="#4A4A4A" text-anchor="middle">Partner</text> </g> <!-- 徽章繩子 --> <line x1="200" y1="342" x2="200" y2="275" stroke="#A0A0A0" stroke-width="2"/> <!-- 名字標籤 --> <g transform="translate(200, 470)"> <text x="0" y="0" font-family="'Microsoft YaHei', 'PingFang TC', sans-serif" font-size="24" fill="#4A4A4A" text-anchor="middle" font-weight="bold">小蔡 Xiao Cai</text> </g> </svg>