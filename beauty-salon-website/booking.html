<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上預約 - 老蔡美業沙龍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">老蔡美業沙龍</div>
            <nav>
                <ul>
                    <li><a href="index.html">首頁</a></li>
                    <li><a href="services.html">服務項目</a></li>
                    <li><a href="booking.html">線上預約</a></li>
                    <li><a href="about.html">關於我們</a></li>
                    <li><a href="contact.html">聯絡我們</a></li>
                </ul>
            </nav>
            <a href="booking.html" class="btn-primary">立即預約</a>
        </div>
    </header>

    <section class="page-header">
        <div class="container">
            <h1>線上預約</h1>
            <p>請選擇您想預約的服務、日期與時間。</p>
        </div>
    </section>

    <section class="booking-form-section">
        <div class="container">
            <form class="booking-form">
                <div class="form-group">
                    <label for="service">選擇服務項目：</label>
                    <select id="service" name="service" required>
                        <option value="">--請選擇--</option>
                        <option value="facial">臉部深層保養</option>
                        <option value="massage">全身舒壓按摩</option>
                        <option value="nail">日式美甲設計</option>
                        <option value="eyelash">韓式嫁接睫毛</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="date">選擇日期：</label>
                    <input type="date" id="date" name="date" required>
                </div>
                <div class="form-group">
                    <label for="time">選擇時間：</label>
                    <input type="time" id="time" name="time" min="11:00" max="20:00" required>
                </div>
                <div class="form-group">
                    <label for="name">您的姓名：</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="phone">聯絡電話：</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="email">電子郵件 (選填)：</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group">
                    <label for="notes">備註 (選填)：</label>
                    <textarea id="notes" name="notes" rows="4"></textarea>
                </div>
                <button type="submit" class="btn-primary">確認預約</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-info">
                <div class="logo">老蔡美業沙龍</div>
                <p>地址：台北市美麗路88號</p>
                <p>電話：(02) 8888-8888</p>
                <p>Email：info@laocai-beauty.com</p>
                <p>營業時間：週二至週日 11:00 - 20:00</p>
            </div>
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">Facebook</a>
                <a href="#">LINE</a>
            </div>
            <div class="copyright">
                <p>&copy; 2026 老蔡美業沙龍. All rights reserved.</p>
            </div>
        </div>
    </footer>
</body>
</html>
