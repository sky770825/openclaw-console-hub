<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>因果覺醒測驗 | 分毫不差</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .quiz-container { max-width: 800px; margin: 0 auto; background: rgba(10, 20, 30, 0.9); border: 2px solid #00d4ff; padding: 4rem; text-align: center; position: relative; }
        .option-btn { display: block; width: 100%; padding: 1.2rem; margin: 1rem 0; border: 1px solid rgba(0, 212, 255, 0.3); background: black; color: white; cursor: pointer; transition: 0.3s; font-size: 1.1rem; text-align: left; padding-left: 2rem; }
        .option-btn:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        .progress-bar { width: 100%; height: 4px; background: #111; margin-bottom: 2rem; }
        .progress-inner { height: 100%; background: #00d4ff; width: 0%; transition: 0.5s; }
    </style>
</head>
<body class="bg-[#020202] text-stone-200 font-serif">
    <nav class="fixed top-0 left-0 w-full z-50 px-12 py-8 bg-black/95 border-b border-gold/20 flex justify-end items-center gap-10 backdrop-blur-md">
        <div class="space-x-10 text-sm tracking-[0.3em] font-bold text-stone-400">
            <a href="../index.html" class="hover:text-gold transition">回首頁</a>
            <a href="deities.html" class="hover:text-gold transition">神明殿堂</a>
            <a href="cases.html" class="hover:text-gold transition">真實案例</a>
        </div>
        <div class="text-2xl font-black text-gold tracking-widest border-l border-gold/30 pl-6"><a href="../index.html">因果真相</a></div>
    </nav>

    <main class="pt-40 px-10">
        <div class="quiz-container">
            <div class="progress-bar"><div id="progress" class="progress-inner"></div></div>
            <h1 class="text-4xl text-[#00d4ff] mb-8 tracking-widest">因果覺醒測驗</h1>
            
            <div id="quiz-ui">
                <p id="question-text" class="text-2xl mb-10 leading-loose min-h-[100px]"></p>
                <div id="options-container" class="space-y-4"></div>
            </div>

            <div id="result-ui" class="hidden">
                <div id="score-circle" class="text-6xl font-black mb-6 text-gold"></div>
                <h2 id="result-title" class="text-3xl mb-6 font-bold"></h2>
                <p id="result-desc" class="text-lg text-stone-400 leading-loose mb-10"></p>
                <div class="flex flex-col gap-4">
                    <button class="btn-premium" onclick="location.reload()">重新參悟</button>
                    <a href="hell.html" class="text-stone-500 hover:text-gold underline">了解業力結算地點 (十八地獄)</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            {
                q: "1. 若在路上撿到鉅額現金，且四下無人，您的第一直覺是？",
                options: [
                    { text: "據為己有，這是天降橫財。", score: -20 },
                    { text: "原地等待或送交警局，非我之物不可取。", score: 20 },
                    { text: "拿走一部分，其餘留給別人撿。", score: -10 }
                ]
            },
            {
                q: "2. 當您看到競爭對手遭遇不幸（如生意失敗或家庭變故）時？",
                options: [
                    { text: "幸災樂禍，覺得這是對方的報應。", score: -15 },
                    { text: "心生同情，若有機會願意給予適度協助。", score: 20 },
                    { text: "不關我的事，冷眼旁觀。", score: 0 }
                ]
            },
            {
                q: "3. 為了達成業績或目的，您是否會稍微美化事實（說善意的謊言）？",
                options: [
                    { text: "經常如此，這只是商業手段。", score: -20 },
                    { text: "絕不欺瞞，堅持誠信是底線。", score: 20 },
                    { text: "偶爾為之，只要不造成大傷害就好。", score: -5 }
                ]
            },
            {
                q: "4. 您如何看待「佔小便宜」這件事？（如逃票、拿取公物等）",
                options: [
                    { text: "這沒什麼，大家都在做。", score: -10 },
                    { text: "勿以惡小而為之，分毫都要清爽。", score: 20 },
                    { text: "有機會就佔，沒機會就算了。", score: -5 }
                ]
            },
            {
                q: "5. 若有人對您惡語相向，您的反應通常是？",
                options: [
                    { text: "加倍罵回去，不能吃虧。", score: -10 },
                    { text: "靜心觀之，不隨其能量起舞。", score: 20 },
                    { text: "記恨在心，尋找機會報復。", score: -20 }
                ]
            }
        ];

        let currentStep = 0;
        let totalScore = 0;

        function renderQuestion() {
            const q = questions[currentStep];
            document.getElementById('question-text').innerText = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.text;
                btn.onclick = () => nextQuestion(opt.score);
                container.appendChild(btn);
            });

            document.getElementById('progress').style.width = `${(currentStep / questions.length) * 100}%`;
        }

        function nextQuestion(score) {
            totalScore += score;
            currentStep++;
            
            if(currentStep < questions.length) {
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('progress').style.width = '100%';
            
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const scoreDisplay = document.getElementById('score-circle');

            scoreDisplay.innerText = `業力積分：${totalScore}`;

            if(totalScore >= 80) {
                title.innerText = "【福德圓滿：高頻覺醒者】";
                title.style.color = "#00d4ff";
                desc.innerText = "您的內在頻率極高，正直與善念已為您建立強大的正面場域。在宇宙的算法中，您屬於「優選執行者」，未來將有更多正能量共振，逢凶化吉，分毫不差。";
            } else if(totalScore >= 0) {
                title.innerText = "【平衡維護：凡塵修行者】";
                title.style.color = "#ffd700";
                desc.innerText = "您在善惡之間維持著微妙的平衡。雖有私慾但尚能自律。提醒您：因果具有複利效應，微小的善念累積亦能改變命運軌跡。請保持警覺。";
            } else {
                title.innerText = "【負債警訊：業力積壓者】";
                title.style.color = "#ff1100";
                desc.innerText = "警報！您的決策模式正在積累沉重的業力負債。根據天地鐵律，這些負能量將在特定時間點進行清算。若不立即止損（遷善改過），未來的回饋恐難以承受。";
            }
        }

        renderQuestion();
    </script>
</body>
</html>
