    <main class="pt-40 pb-32 max-w-4xl mx-auto px-6">
        <h1 class="text-5xl mb-4 tracking-[0.4em] text-gold text-center">加持商城</h1>
        <p class="text-center text-stone-500 mb-10 tracking-widest">以每日功過格累積的會員分數兌換限時加持，於因果光場加持台中使用</p>

        <div class="shop-hero">
            <div class="flex flex-wrap items-center justify-between gap-4">

                    <p class="text-stone-500 text-sm mb-1">目前可用分數（功過格淨值 − 已使用）</p>
                    <p class="shop-score" id="shop-available">0</p>
                    <p class="text-xs text-stone-500 mt-1">分數來自 <a href="merit.html" class="text-gold hover:underline">每日功過格</a> 的善惡淨值，完成勾選後會同步至此。</p>

        <h2 class="text-xl text-gold font-bold mb-4 tracking-widest">可兌換加持</h2>
        <div id="shop-products"></div>

        <div class="shop-active" id="shop-active-wrap">
            <p class="shop-active-title">目前生效中的加持</p>
            <div id="shop-active-list" class="text-stone-400 text-sm">尚無生效中的加持。於加持台啟用後，這裡會顯示剩餘時間。</div>
        </div>

        <p class="text-center text-stone-500 text-sm mt-12"><a href="simulator.html" class="text-gold hover:underline">前往因果光場加持台</a> 使用已啟用的加持</p>
    </main>

    <script>
        (function() {
            const MERIT_NET_KEY = 'causelaw_merit_net_score';
            const SPENT_KEY = 'causelaw_merit_spent';
            const BUFFS_KEY = 'causelaw_active_buffs';
            const INVENTORY_KEY = 'causelaw_item_inventory_v1';

            const PRODUCTS = [
                { id: 'lotus-ring', name: '護持蓮花', icon: '🪷', cost: 40, durationMin: 24 * 60, desc: '聚焦【感情與家庭】的柔和守護，願彼此心念柔軟、少爭執。' },
                { id: 'heart-bell', name: '淨心法鈴', icon: '🔔', cost: 25, durationMin: 24 * 60, desc: '聚焦【工作與事業】的清明判斷，願溝通順暢、決策少偏差。' },
                { id: 'golden-mandala', name: '金色曼陀羅', icon: '✨', cost: 60, durationMin: 24 * 60, desc: '聚焦【財富與資源】的正向流動，願以正財、善念改善金錢結構。' },
                { id: 'blessing-cloud', name: '祥雲護持', icon: '☁️', cost: 35, durationMin: 24 * 60, desc: '聚焦【人際與貴人】的祥和氛圍，願相處多理解、少誤會。' },
                { id: 'lotus-seed', name: '蓮子心燈', icon: '🪷', cost: 20, durationMin: 24 * 60, desc: '聚焦【身心健康】的一點心燈，願身體安穩、情緒平和。' }
            ];

            function now() { return Date.now(); }
            function getNet() {
                const raw = localStorage.getItem(MERIT_NET_KEY);
                const n = parseInt(raw || '0', 10);
                return isNaN(n) ? 0 : n;
            }
            function getSpent() {
                const raw = localStorage.getItem(SPENT_KEY);
                const n = parseInt(raw || '0', 10);
                return isNaN(n) ? 0 : n;
            }
            function setSpent(v) {
                localStorage.setItem(SPENT_KEY, String(v));
            }
            function loadInventory() {
                try {
                    const raw = localStorage.getItem(INVENTORY_KEY);
                    const obj = raw ? JSON.parse(raw) : {};
                    return obj && typeof obj === 'object' ? obj : {};
                } catch (e) {
                    return {};
                }
            }
            function saveInventory(inv) {
                try {
                    localStorage.setItem(INVENTORY_KEY, JSON.stringify(inv));
                } catch (e) {}
            }
            function loadBuffs() {
                try {
                    const raw = localStorage.getItem(BUFFS_KEY);
                    const arr = raw ? JSON.parse(raw) : [];
                    const valid = (Array.isArray(arr) ? arr : []).filter(b => b && b.id && b.expiresAt && b.expiresAt > now());
                    localStorage.setItem(BUFFS_KEY, JSON.stringify(valid));
                    return valid;
                } catch (e) {
                    return [];
                }
            }
            function saveBuffs(list) {
                localStorage.setItem(BUFFS_KEY, JSON.stringify(list));
            }

            function render() {
                const net = getNet();
                const spent = getSpent();
                const available = Math.max(0, net - spent);
                const buffs = loadBuffs();
                const activeMap = {};
                buffs.forEach(b => { activeMap[b.id] = b; });
                const inventory = loadInventory();

                document.getElementById('shop-available').textContent = available;

                const productsEl = document.getElementById('shop-products');
                productsEl.innerHTML = '';
                PRODUCTS.forEach(function(p) {
                    const durationMs = p.durationMin * 60 * 1000;
                    const count = inventory[p.id] || 0;
                    const enough = available >= p.cost;
                    const btnDisabled = !enough;
                    const div = document.createElement('div');
                    div.className = 'shop-product';
                    div.innerHTML = `
                        <span class="shop-product-icon">${p.icon}</span>
                        <div class="shop-product-info">
                            <div class="shop-product-name">${p.name}</div>
                            <div class="shop-product-desc">${p.desc}</div>
                            <div class="shop-product-meta">${p.cost} 分 ／ 1 份（時效 1 天）｜ 庫存：${count} 份</div>
                        </div>
                        <div class="shop-product-actions">
                            <button type="button" data-id="${p.id}" ${btnDisabled ? 'disabled' : ''}>兌換</button>
                        </div>
                    `;
                    const btn = div.querySelector('button');
                    if (!btnDisabled) {
                        btn.addEventListener('click', function() {
                            const id = this.dataset.id;
                            const prod = PRODUCTS.find(function(x) { return x.id === id; });
                            if (!prod) return;
                            const av = Math.max(0, getNet() - getSpent());
                            if (av < prod.cost) {
                                alert('目前可用分數不足，請先至功過格累積。');
                                render();
                                return;
                            }
                            const inv = loadInventory();
                            inv[prod.id] = (inv[prod.id] || 0) + 1;
                            saveInventory(inv);
                            setSpent(getSpent() + prod.cost);
                            render();
                        });
                    }
                    productsEl.appendChild(div);
                });

                const activeListEl = document.getElementById('shop-active-list');
                const wrap = document.getElementById('shop-active-wrap');
                if (buffs.length === 0) {
                    activeListEl.textContent = '尚無生效中的加持。購買後請至加持台啟用。';
                } else {
                    activeListEl.innerHTML = '';
                    buffs.forEach(function(b) {
                        const prod = PRODUCTS.find(function(x) { return x.id === b.id; });
                        if (!prod) return;
                        const remain = Math.max(0, Math.ceil((b.expiresAt - now()) / 1000));
                        const txt = remain >= 60 ? Math.ceil(remain / 60) + ' 分' : remain + ' 秒';
                        const span = document.createElement('span');
                        span.className = 'shop-active-item';
                        span.innerHTML = `${prod.icon} ${prod.name} <span class="text-amber-200/90">${txt}</span>`;
                        activeListEl.appendChild(span);
                    });
                }
            }

            render();
            setInterval(render, 10000);
        })();
    </script>
