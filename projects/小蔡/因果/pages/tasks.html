    <main class="pt-40 pb-24 px-6">
        <div class="task-wrap">
            <div class="text-center mb-8">
                <h1 class="text-4xl text-gold font-black mb-2">會員任務中心</h1>
                <p class="text-stone-500">今日修行清單：誦經、懺悔、善行。完成後會自動同步到會員功德帳本。</p>
                <p id="task-member-status" class="text-xs text-stone-500 mt-3">檢查會員狀態中...</p>
                <div class="mt-4 flex justify-center gap-3 flex-wrap">
                    <button type="button" onclick="loadTodayTasks()" class="px-4 py-2 text-xs border border-gold/40 text-gold hover:bg-gold/10 transition">重新整理</button>
                    <a href="merit.html" class="px-4 py-2 text-xs border border-gold/40 text-gold hover:bg-gold/10 transition">回功過格</a>
                </div>
            </div>

            <div id="task-summary" class="mb-6 text-sm text-stone-400 text-center"></div>

            <div id="tasks-container">
                <div class="text-center py-16 text-stone-500">載入中...</div>
            </div>
        </div>
    </main>

    <script>
        var currentTasks = [];

        function dbTable(name, fallback) {
            var db = window.CauseLawClient && window.CauseLawClient.DB;
            if (db && db.tables && db.tables[name]) return db.tables[name];
            return fallback;
        }

        function getTodayLocalDate() {
            var d = new Date();
            var y = d.getFullYear();
            var m = String(d.getMonth() + 1).padStart(2, '0');
            var day = String(d.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + day;
        }

        function taskTypeLabel(taskType) {
            var map = {
                chanting: '誦經修持',
                repentance: '懺悔補過',
                good_deed: '善行落地',
                speech_discipline: '口業修持'
            };
            return map[taskType] || taskType;
        }

        function setTaskMemberStatus(message, tone) {
            var el = document.getElementById('task-member-status');
            if (!el) return;
            el.textContent = message;
            el.className = 'text-xs mt-3 ' + (tone === 'error' ? 'text-red-400' : (tone === 'ok' ? 'text-emerald-400' : 'text-stone-500'));
        }

        function renderSummary(tasks) {
            var el = document.getElementById('task-summary');
            if (!el) return;
            var completed = tasks.filter(function (t) { return t.status === 'completed'; }).length;
            var pending = tasks.length - completed;
            el.innerHTML = '今日任務 ' + tasks.length + ' 項　|　已完成 <span class="text-emerald-400">' + completed + '</span>　|　待完成 <span class="text-amber-300">' + pending + '</span>';
        }

        function renderTasks(tasks) {
            var container = document.getElementById('tasks-container');
            if (!container) return;
            if (!tasks.length) {
                container.innerHTML = '<div class="text-center py-16 text-stone-500">今日尚無任務。先到功過格同步，系統會自動產生任務。</div>';
                renderSummary(tasks);
                return;
            }
            renderSummary(tasks);
            container.innerHTML = tasks.map(function (task) {
                var completedCount = Number(task.completed_count || 0);
                var targetCount = Math.max(1, Number(task.target_count || 1));
                var pct = Math.max(0, Math.min(100, Math.round((completedCount / targetCount) * 100)));
                var done = task.status === 'completed';
                var progressText = completedCount + ' / ' + targetCount;
                return (
                    '<div class="task-card">' +
                        '<div class="flex items-center justify-between gap-2 mb-2">' +
                            '<div class="text-gold font-bold">' + escapeHtml(task.task_title || '未命名任務') + '</div>' +
                            '<span class="task-chip ' + (done ? 'completed' : '') + '">' + (done ? '已完成' : taskTypeLabel(task.task_type)) + '</span>' +
                        '</div>' +
                        '<div class="text-xs text-stone-500 mb-2">任務類型：' + taskTypeLabel(task.task_type) + '　|　目標：' + progressText + '</div>' +
                        (task.evidence_note ? ('<div class="text-xs text-stone-400 mb-3">說明：' + escapeHtml(task.evidence_note) + '</div>') : '') +
                        '<div class="task-progress mb-3"><div class="task-progress-fill" style="width:' + pct + '%"></div></div>' +
                        '<div class="flex gap-2 flex-wrap">' +
                            '<button type="button" ' + (done ? 'disabled' : '') + ' onclick="increaseTaskProgress(\'' + task.id + '\')" class="px-3 py-2 text-xs border border-gold/40 text-gold hover:bg-gold/10 transition ' + (done ? 'opacity-40 cursor-not-allowed' : '') + '">完成 +1</button>' +
                            '<button type="button" ' + (done ? 'disabled' : '') + ' onclick="completeTask(\'' + task.id + '\')" class="px-3 py-2 text-xs border border-emerald-500/40 text-emerald-300 hover:bg-emerald-500/10 transition ' + (done ? 'opacity-40 cursor-not-allowed' : '') + '">標記完成</button>' +
                        '</div>' +
                    '</div>'
                );
            }).join('');
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text || '';
            return d.innerHTML;
        }

        async function ensureMemberReady() {
            if (!window.CauseLawClient || !window.CauseLawClient.isReady()) {
                setTaskMemberStatus('Supabase 未設定，任務中心不可用。', 'error');
                return null;
            }
            var user = await window.CauseLawClient.getSessionUser();
            if (!user) {
                setTaskMemberStatus('尚未登入會員，請先登入。', 'error');
                return null;
            }
            if (window.CauseLawClient.ensureMemberProfile) {
                try {
                    await window.CauseLawClient.ensureMemberProfile(user);
                } catch (err) {
                    console.error('初始化會員資料失敗:', err);
                    setTaskMemberStatus('會員資料初始化失敗，請稍後再試。', 'error');
                    return null;
                }
            }
            setTaskMemberStatus('已登入會員：' + (user.email || user.id), 'ok');
            return user;
        }

        async function loadTodayTasks() {
            var user = await ensureMemberReady();
            if (!user) {
                renderTasks([]);
                return;
            }
            try {
                var supabase = window.CauseLawClient.getClient();
                var today = getTodayLocalDate();
                var query = await supabase
                    .from(dbTable('tasks', 'causelaw_yinguo_v1.tasks'))
                    .select('id,task_type,task_title,target_count,completed_count,status,evidence_note,task_date,created_at')
                    .eq('member_id', user.id)
                    .eq('task_date', today)
                    .order('created_at', { ascending: false });
                if (query.error) throw query.error;
                currentTasks = query.data || [];
                renderTasks(currentTasks);
            } catch (err) {
                console.error('載入今日任務失敗:', err);
                setTaskMemberStatus('載入失敗，請確認 RLS 與資料表。', 'error');
                renderTasks([]);
            }
        }

        async function updateTask(taskId, nextCompleted, nextStatus) {
            var user = await ensureMemberReady();
            if (!user) return;
            try {
                var supabase = window.CauseLawClient.getClient();
                var payload = {
                    completed_count: nextCompleted,
                    status: nextStatus
                };
                var result = await supabase
                    .from(dbTable('tasks', 'causelaw_yinguo_v1.tasks'))
                    .update(payload)
                    .eq('id', taskId)
                    .eq('member_id', user.id);
                if (result.error) throw result.error;
                await loadTodayTasks();
            } catch (err) {
                console.error('更新任務進度失敗:', err);
                setTaskMemberStatus('更新失敗，請稍後再試。', 'error');
            }
        }

        async function increaseTaskProgress(taskId) {
            var task = currentTasks.find(function (x) { return x.id === taskId; });
            if (!task || task.status === 'completed') return;
            var target = Math.max(1, Number(task.target_count || 1));
            var next = Math.min(target, Number(task.completed_count || 0) + 1);
            var nextStatus = next >= target ? 'completed' : 'pending';
            await updateTask(taskId, next, nextStatus);
        }

        async function completeTask(taskId) {
            var task = currentTasks.find(function (x) { return x.id === taskId; });
            if (!task) return;
            var target = Math.max(1, Number(task.target_count || 1));
            await updateTask(taskId, target, 'completed');
        }

        document.addEventListener('DOMContentLoaded', function () {
            loadTodayTasks();
        });
        window.addEventListener('causelaw:auth-state-changed', function () {
            loadTodayTasks();
        });
    </script>
