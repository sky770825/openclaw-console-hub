name: Supabase Live Smoke

on:
  workflow_dispatch:
    inputs:
      keep_data:
        description: "Keep smoke data for debugging"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      schema:
        description: "Supabase schema to test"
        required: false
        default: "causelaw_yinguo_v1"
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CAUSELAW_SUPABASE_URL: ${{ secrets.CAUSELAW_SUPABASE_URL }}
      CAUSELAW_SUPABASE_ANON_KEY: ${{ secrets.CAUSELAW_SUPABASE_ANON_KEY }}
      CAUSELAW_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CAUSELAW_SUPABASE_SERVICE_ROLE_KEY }}
      CAUSELAW_DB_SCHEMA: ${{ inputs.schema }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Secrets
        run: |
          test -n "$CAUSELAW_SUPABASE_URL"
          test -n "$CAUSELAW_SUPABASE_ANON_KEY"
          test -n "$CAUSELAW_SUPABASE_SERVICE_ROLE_KEY"

      - name: Run Live Smoke
        run: |
          if [ "${{ inputs.keep_data }}" = "true" ]; then
            python3 scripts/supabase_live_smoke.py --keep-data
          else
            python3 scripts/supabase_live_smoke.py
          fi
