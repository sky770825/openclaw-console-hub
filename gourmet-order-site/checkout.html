<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>老蔡美食 - 結帳</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html"><h1>老蔡美食</h1></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">首頁/菜單</a></li>
                <li><a href="#">關於我們</a></li>
                <li><a href="#">聯絡方式</a></li>
            </ul>
        </nav>
        <div class="cart-icon-container">
            <a href="cart.html">
                <img src="https://via.placeholder.com/24" alt="購物車圖示">
                <span class="cart-count">0</span>
            </a>
        </div>
    </header>

    <main>
        <section id="checkout-section">
            <h2>訂單結帳</h2>
            <div class="checkout-container">
                <div class="order-summary">
                    <h3>您的訂單</h3>
                    <div class="summary-item">
                        <span>紅燒牛肉麵 x 1</span>
                        <span>$180</span>
                    </div>
                    <div class="summary-item">
                        <span>珍珠奶茶 x 2</span>
                        <span>$140</span>
                    </div>
                    <div class="summary-total">
                        <span>總金額</span>
                        <span>$320</span>
                    </div>
                </div>

                <form class="customer-info-form">
                    <h3>收件人資訊</h3>
                    <div class="form-group">
                        <label for="name">姓名:</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">電話:</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="address">地址:</label>
                        <input type="text" id="address" name="address" required>
                    </div>
                    <div class="form-group">
                        <label for="notes">備註 (選填):</label>
                        <textarea id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <h3>付款方式</h3>
                    <div class="form-group">
                        <label for="payment-method">選擇付款方式:</label>
                        <select id="payment-method" name="payment-method">
                            <option value="cash">貨到付款</option>
                            <option value="credit-card">信用卡 (僅供示範)</option>
                        </select>
                    </div>

                    <button type="submit" class="place-order-button">確認下單</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-info">
            <p>地址：台北市美食街101號</p>
            <p>電話：(02) 1234-5678</p>
            <p>營業時間：週一至週日 11:00 - 21:00</p>
        </div>
        <div class="social-media">
            <a href="#"><img src="https://via.placeholder.com/24?text=FB" alt="Facebook"></a>
            <a href="#"><img src="https://via.placeholder.com/24?text=IG" alt="Instagram"></a>
            <a href="#"><img src="https://via.placeholder.com/24?text=LINE" alt="Line"></a>
        </div>
        <p class="copyright">&copy; 2026 老蔡美食. All rights reserved.</p>
    </footer>
</body>
</html>
