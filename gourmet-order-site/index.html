<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主人美食 - 首頁</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html"><h1>主人美食</h1></a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">首頁/菜單</a></li>
                <li><a href="#">關於我們</a></li>
                <li><a href="#">聯絡方式</a></li>
            </ul>
        </nav>
        <div class="cart-icon-container">
            <a href="cart.html">
                <img src="https://via.placeholder.com/24" alt="購物車圖示"> <!-- Placeholder for cart icon -->
                <span class="cart-count">0</span>
            </a>
        </div>
    </header>

    <main>
        <section class="hero-banner">
            <h1>主人的私房好味道，今天想吃哪一道？</h1>
            <p>堅持手工製作，嚴選新鮮食材，只為您呈現最道地的美味。</p>
            <a href="#menu-section" class="cta-button">立即點餐</a>
        </section>

        <section id="menu-section">
            <h2>美味菜單</h2>
            <div class="menu-grid">
                <!-- Example Menu Item 1 -->
                <article class="menu-item">
                    <img src="https://via.placeholder.com/300x200?text=紅燒牛肉麵" alt="紅燒牛肉麵">
                    <div class="menu-item-info">
                        <h3>紅燒牛肉麵</h3>
                        <p>慢燉牛肉，湯頭濃郁，麵條Q彈。</p>
                        <span class="price">$180</span>
                        <button class="add-to-cart">加入購物車</button>
                    </div>
                </article>
                <!-- Example Menu Item 2 -->
                <article class="menu-item">
                    <img src="https://via.placeholder.com/300x200?text=麻婆豆腐飯" alt="麻婆豆腐飯">
                    <div class="menu-item-info">
                        <h3>麻婆豆腐飯</h3>
                        <p>香麻帶勁，豆腐滑嫩，白飯絕配。</p>
                        <span class="price">$150</span>
                        <button class="add-to-cart">加入購物車</button>
                    </div>
                </article>
                 <!-- Example Menu Item 3 -->
                <article class="menu-item">
                    <img src="https://via.placeholder.com/300x200?text=珍珠奶茶" alt="珍珠奶茶">
                    <div class="menu-item-info">
                        <h3>珍珠奶茶</h3>
                        <p>經典台味，Q彈珍珠，香醇奶茶。</p>
                        <span class="price">$70</span>
                        <button class="add-to-cart">加入購物車</button>
                    </div>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-info">
            <p>地址：台北市美食街101號</p>
            <p>電話：(02) 1234-5678</p>
            <p>營業時間：週一至週日 11:00 - 21:00</p>
        </div>
        <div class="social-media">
            <a href="#"><img src="https://via.placeholder.com/24?text=FB" alt="Facebook"></a>
            <a href="#"><img src="https://via.placeholder.com/24?text=IG" alt="Instagram"></a>
            <a href="#"><img src="https://via.placeholder.com/24?text=LINE" alt="Line"></a>
        </div>
        <p class="copyright">&copy; 2026 主人美食. All rights reserved.</p>
    </footer>
</body>
</html>
